[tools]
uv = "0.8.18"
bun = "1.3.14"
deno = "2.4.5"
rust = "1.95.0"
usage = "1.3.4"
node = "24.15.0"
python = "3.13.0"
dotnet = "10.0.300"
java = "corretto-23.0.1.8.1"
"pipx:neovim-remote" = "2.5.1"

[settings]
jobs = 16
raw = false
yes = false
color = true
verbose = false
paranoid = false
env_file = '.env'
gpg_verify = true
asdf_compat = true
experimental = true
http_timeout = "30"
task_output = "prefix"
env_shell_expand = true
color_theme = "catppuccin"
exec_auto_install = true
legacy_version_file = true
always_keep_install = false
always_keep_download = false
not_found_auto_install = true
idiomatic_version_file_enable_tools = ['node']
plugin_autoupdate_last_check_duration = '1 day'
shorthands_file = '~/.config/mise/shorthands.toml'
