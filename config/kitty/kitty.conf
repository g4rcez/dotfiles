# ─── Font ─────────────────────────────────────────────────────────────────── #
font_family      JetBrainsMono Nerd Font Regular
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        16.0

modify_font      cell_height 150%
modify_font      cell_width  97%

# Never disable ligatures (calt/clig/liga on by default for this font)
disable_ligatures never

# ─── Catppuccin Mocha — matches Ghostty overrides exactly ─────────────────── #
background            #1A1B27
foreground            #efefef
selection_background  #585b70
selection_foreground  #cdd6f4
cursor                #f5e0dc
cursor_text_color     #1e1e2e
cursor_shape          block
cursor_blink_interval 0.0

# normal (0–7)
color0   #45475a
color1   #f38ba8
color2   #a6e3a1
color3   #f9e2af
color4   #89b4fa
color5   #f5c2e7
color6   #94e2d5
color7   #a6adc8

# bright (8–15)
color8   #585b70
color9   #f37799
color10  #89d88b
color11  #ebd391
color12  #74a8fc
color13  #f2aede
color14  #6bd7ca
color15  #bac2de

# ─── Scrollback ───────────────────────────────────────────────────────────── #
scrollback_lines 100000

# ─── Mouse ────────────────────────────────────────────────────────────────── #
mouse_hide_wait 3.0
copy_on_select  clipboard

# ─── Bell ─────────────────────────────────────────────────────────────────── #
enable_audio_bell    no
visual_bell_duration 0.0

# ─── Performance ──────────────────────────────────────────────────────────── #
repaint_delay   10
input_delay     3
sync_to_monitor yes

# ─── Window ───────────────────────────────────────────────────────────────── #
window_padding_width            2
confirm_os_window_close         0
hide_window_decorations         titlebar-only
macos_option_as_alt             yes
macos_quit_when_last_window_closed yes

# ─── Tabs — hidden; tmux owns window/session management ───────────────────── #
tab_bar_style hidden

# ─── URLs ─────────────────────────────────────────────────────────────────── #
detect_urls   yes
open_url_with default
url_style     curly

# ─── tmux integration ─────────────────────────────────────────────────────── #

# 1. Remote control via socket so `kitty @` works inside tmux panes
#    (enables icat passthrough, kitty-scrollback.nvim, etc.)
allow_remote_control socket-only
listen_on            unix:/tmp/kitty-{kitty_pid}

# 2. Yield shell integration to zsh/tmux — kitty must not inject its own prompts
shell_integration no-rc no-title

# 3. Full OSC 52 clipboard passthrough — tmux already has set-clipboard on
clipboard_control write-clipboard write-primary read-clipboard-ask read-primary-ask

# 4. Graphics protocol passthrough (Sixel/kitty images in tmux panes)
#    Requires `set -g allow-passthrough on` in tmux.conf — already set.

# 5. True-colour passthrough: tmux.conf must declare RGB capability for
#    xterm-kitty so colours are not downsampled. The required line is:
#      set -as terminal-features ",xterm-kitty:RGB"
#    → added to config/tmux/tmux.conf alongside existing terminal-features.
