##########################################################################################
## Prefix and terminal passthrough

# Start with an empty prefix key table so only the bindings below are active.
unbind -a -T prefix

# Prefix is Ctrl-p instead of tmux's default Ctrl-b.
set -g prefix C-p

# Preserve terminal/app env vars when attaching so Ghostty/GUI-specific features keep working.
set -ga update-environment "GHOSTTY_RESOURCES_DIR TERM_PROGRAM"

# Let applications emit terminal escape sequences through tmux (needed for some rich terminal UIs).
set -g allow-passthrough on

##########################################################################################
## General behavior

# Pass modern key encodings through tmux; this keeps combos like Shift+Enter distinguishable.
set -g extended-keys on
set -g extended-keys-format csi-u
set -s extended-keys on
set -s extended-keys-format csi-u

# Advertise terminal capabilities tmux should expose to apps inside panes.
set -as terminal-features "xterm*:extkeys,*:hyperlinks"
set -as terminal-features ",xterm-kitty:RGB"
set -as terminal-features ",xterm*:RGB"
set -as terminal-features 'xterm*:extkeys'

# Keep window names in sync with the active command; formatted later by config/tmux/window.
set -g automatic-rename on

# Number windows and panes from 1, matching keyboard bindings and humans better than 0.
set -g base-index 1
set -g pane-base-index 1

# Report a truecolor-capable terminal to programs running inside tmux.
set -g default-terminal "tmux-256color"

# Keep the tmux client open if the attached session is destroyed.
set -g detach-on-destroy off

# Shorter UI popups/messages: pane numbers for 800ms, status messages for 1s.
set -g display-panes-time 800
set -g display-time 1000

# Remove tmux's escape delay so Vim/Neovim mode switches feel instant.
set -g escape-time 0

# Large scrollback for long-running agents/builds.
set -g history-limit 100000

# Mark windows when background panes produce output, and show it visually.
set -g monitor-activity on
set -g visual-activity on

# Enable mouse pane selection, resizing, copy-mode scrolling, and status clicks.
set -g mouse on

# Close gaps after windows are removed.
set -g renumber-windows on

# Allow repeated prefix bindings, e.g. resize/navigation, for 1s.
set -g repeat-time 1000

# Sync tmux copies with the system clipboard when supported by the terminal.
set -g set-clipboard on
set -s set-clipboard on

# Let tmux set the terminal/window title.
set -g set-titles on

# Keep the window list centered in the status bar.
set -g status-justify absolute-centre

# Compatibility no-op on newer tmux; quiet in case older configs expect it.
set -q -g utf8 on

# Keep the tmux server alive even when the last session exits.
set -s exit-empty off

# Tell programs when focus enters/leaves their pane.
set -s focus-events on

## Claude Code
# Claude needs truecolor plus passthrough/extended keys above for correct rendering and shortcuts.
set-environment -g CLAUDE_CODE_TMUX_TRUECOLOR 1

##########################################################################################
## Plugin variables

# Restore saved sessions automatically when tmux-continuum starts.
set -g @continuum-restore 'on'

##########################################################################################
## Key bindings

# Prefix + r / w rename the current session/window.
bind r command-prompt "rename-session '%%'"
bind w command-prompt "rename-window '%%'"

# Prefix + , opens the current pane's scrollback in Neovim.
bind , run-shell "bash $HOME/dotfiles/bin/tmux-edit-scrollback '#{pane_id}' '#{pane_current_path}'"

# Prefix + R reloads this file.
bind R source-file ~/dotfiles/config/tmux/tmux.conf\; display-message "Config reloaded"

# Prefix + \ toggles the agent sidebar pane.
# Note: the split binding below currently reuses this key, so the later binding wins.
bind-key . run-shell "$HOME/dotfiles/bin/tmux-sidebar-toggle"

# Ctrl-Tab / Ctrl-Shift-Tab switch windows without pressing prefix.
bind -n C-Tab select-window -n
bind -n C-S-Tab select-window -p

# Prefix + p opens the session picker in a new window.
bind p display-popup -B -w '100%' -h '100%' -E -x C -y S "bash $HOME/dotfiles/bin/tmux-fzf-session"

# Prefix + b/Tab/o open the window picker as a centered popup.
bind b display-popup -B -w '98%' -h '98%' -E -x C -y S "bash $HOME/dotfiles/bin/tmux-fzf-windows"
bind Tab display-popup -B -w '98%' -h '98%' -E -x C -y S "bash $HOME/dotfiles/bin/tmux-fzf-windows"
bind o display-popup -B -w '98%' -h '98%' -E -x C -y S "bash $HOME/dotfiles/bin/tmux-fzf-windows"

# Prefix + a opens the session picker in a new window.
bind a display-popup -B -w '98%' -h '98%' -E -x C -y S "bash $HOME/dotfiles/bin/ai sessions"

# Splits start in the current pane's working directory.
bind - split-window -v -c '#{pane_current_path}'
bind \\ split-window -h -c '#{pane_current_path}'

# Quick access to copy-mode, command prompt, and killing the current window.
bind v copy-mode
bind : command-prompt
bind x kill-window

# Prefix + t creates a new tab/window in the current directory.
bind t new-window -c "#{pane_current_path}"

# Floating scratchpad: prefix + f toggles a persistent popup session.
set -g @floax-bind 'f'
set -g @floax-session-name 'draft'
set -g @floax-title 'draft'
set -g @floax-width '90%'
set -g @floax-height '90%'
set -g @floax-border-color 'cyan'
set -g @floax-text-color 'cyan'
set -g @floax-change-path 'false'

# Prefix + number jumps to that window; 0 maps to window 10.
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9
bind 0 select-window -t 10

# Prefix + vim keys move between panes; -r makes holding/repeating work.
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Prefix + Alt-arrows resize panes in 5-cell steps.
bind-key -r -T prefix M-Up resize-pane -U 5
bind-key -r -T prefix M-Down resize-pane -D 5
bind-key -r -T prefix M-Left resize-pane -L 5
bind-key -r -T prefix M-Right resize-pane -R 5

# Prefix + Alt-vim keys also resize panes in 5-cell steps.
bind-key -r -T prefix M-k resize-pane -U 5
bind-key -r -T prefix M-j resize-pane -D 5
bind-key -r -T prefix M-h resize-pane -L 5
bind-key -r -T prefix M-l resize-pane -R 5

# Alt-arrows move between panes without prefix.
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

##########################################################################################
## Copy-mode bindings

# Vi-style copy mode: v starts selection, Ctrl-v toggles rectangle mode, y copies.
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle
bind-key -T copy-mode-vi 'y' send -X copy-selection

##########################################################################################
## Status line

# Use the helper script to turn the current command/path into icon + shortened window name.
set-option -g automatic-rename-format "#($HOME/dotfiles/config/tmux/window #{q:pane_current_command} #{q:pane_id} #{q:pane_current_path})"

# Load status bar colors and left/right/window formats.
run "~/.config/tmux/statusbar.tmux"

# Icons shown by tmux-prefix-highlight in normal/prefix/copy modes.
set -g @prefix_highlight_fg 'white'
set -g @prefix_highlight_prefix_prompt ''
set -g @prefix_highlight_empty_prompt ''
set -g @prefix_highlight_copy_prompt ''

# Put the status bar at the top of the terminal.
set -g status-position top

# Vi keys in tmux copy mode.
setw -g mode-keys vi

# Prefix + uppercase Vim keys resize panes too.
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##########################################################################################
## Plugins

# TPM plugins. Install/update with prefix + I / prefix + U after TPM is installed.
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'Ataraxy-Labs/opensessions'

# TPM must be last so it can read the @plugin declarations above.
run '~/.tmux/plugins/tpm/tpm'
