##########################################################################################
## prefix key
unbind -a -T prefix
set -g prefix C-p
##########################################################################################
## general
set -as terminal-features "xterm*:extkeys,*:hyperlinks"
set -as terminal-features ",xterm-kitty:RGB"
set -as terminal-features ",xterm*:RGB"
set -g allow-passthrough on
set -g automatic-rename on
set -g base-index 1
set -g default-terminal "tmux-256color"
set -g detach-on-destroy off
set -g display-panes-time 800
set -g display-time 1000
set -g escape-time 0
set -g extended-keys on
set -g extended-keys-format csi-u
set -g history-limit 100000
set -g monitor-activity on
set -g mouse on
set -g pane-base-index 1
set -g renumber-windows on
set -g repeat-time 1000
set -g set-clipboard on
set -g set-titles on
set -g status-justify absolute-centre
set -g visual-activity on
set -q -g utf8 on
set -s exit-empty off
set -s extended-keys on
set -s extended-keys-format csi-u
set -s focus-events on
set -s set-clipboard on

## Claude Code
set-environment -g CLAUDE_CODE_TMUX_TRUECOLOR 1

##########################################################################################
## variables
set -g @continuum-restore 'on'

##########################################################################################
## key bindings
bind r command-prompt "rename-session '%%'"
bind w command-prompt "rename-window '%%'"
bind , run-shell "bash $HOME/dotfiles/bin/tmux-edit-scrollback '#{pane_id}' '#{pane_current_path}'"
bind R source-file ~/dotfiles/config/tmux/tmux.conf\; display-message "Config reloaded"

bind -n C-Tab select-window -n
bind -n C-S-Tab select-window -p

bind p new-window "bash $HOME/dotfiles/bin/tmux-fzf-session"
bind b display-popup -B -w '90%' -h '90%' -E -x C -y S "bash $HOME/dotfiles/bin/tmux-fzf-windows"
bind Tab display-popup -B -w '90%' -h '90%' -E -x C -y S "bash $HOME/dotfiles/bin/tmux-fzf-windows"
bind o display-popup -B -w '90%' -h '90%' -E -x C -y S "bash $HOME/dotfiles/bin/tmux-fzf-windows"

bind - split-window -v -c '#{pane_current_path}'
bind \\ split-window -h -c '#{pane_current_path}'
bind v copy-mode
bind : command-prompt
bind x kill-window

# tabs
bind t new-window -c "#{pane_current_path}"

# Floating scratchpad: prefix + f toggles a persistent popup session.
set -g @floax-bind 'f'
set -g @floax-session-name 'draft'
set -g @floax-title 'draft'
set -g @floax-width '90%'
set -g @floax-height '90%'
set -g @floax-border-color 'cyan'
set -g @floax-text-color 'cyan'
set -g @floax-change-path 'false'

# windows
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9
bind 0 select-window -t 10

# pane navigation
bind -r h select-pane -L  # move left
bind -r j select-pane -D  # move down
bind -r k select-pane -U  # move up
bind -r l select-pane -R  # move right

# pane resize
bind-key -r -T prefix M-Up resize-pane -U 5
bind-key -r -T prefix M-Down resize-pane -D 5
bind-key -r -T prefix M-Left resize-pane -L 5
bind-key -r -T prefix M-Right resize-pane -R 5

bind-key -r -T prefix M-k resize-pane -U 5
bind-key -r -T prefix M-j resize-pane -D 5
bind-key -r -T prefix M-h resize-pane -L 5
bind-key -r -T prefix M-l resize-pane -R 5

bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

##########################################################################################
## buffers
bind-key -T copy-mode-vi 'v' send -X begin-selection     # Begin selection in copy mode.
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle  # Begin selection in copy mode.
bind-key -T copy-mode-vi 'y' send -X copy-selection

##########################################################################################
## status line
set-option -g automatic-rename-format "#($HOME/dotfiles/config/tmux/window #{pane_current_command} #{window_panes} #{pane_current_path})"
run "~/.config/tmux/statusbar.tmux"
# icons
set -g @prefix_highlight_fg 'white'
set -g @prefix_highlight_prefix_prompt ''
set -g @prefix_highlight_empty_prompt ''
set -g @prefix_highlight_copy_prompt ''
set -g status-position top

setw -g mode-keys vi
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##########################################################################################
## plugins
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'Ataraxy-Labs/opensessions'
run '~/.tmux/plugins/tpm/tpm'
